name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Build release
        run: cargo build --release
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: arachne-incremental.exe
          path: target/release/arachne-incremental.exe
